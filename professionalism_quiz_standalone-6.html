<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Professionalism Quiz">
<meta name="description" content="Interactive professionalism quiz for students and working professionals.">
<title>Professionalism Quiz</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial,sans-serif;background:#0a1f44;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 12px}
  @media(max-width:480px){body{padding:10px 8px}}
  .card{background:#fff;border-radius:12px;max-width:1200px;width:100%;padding:48px 50px}
  .header{text-align:center;margin-bottom:24px}
  .header .tag{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#185FA5;margin-bottom:8px}
  .header h1{font-size:24px;font-weight:900;color:#0a1f44;line-height:1.3;margin-bottom:8px}
  .header p{font-size:13px;color:#666;line-height:1.7}
  .fill-s{background:#1D9E75}.fill-p{background:#185FA5}
  .level-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .lc{border:1.5px solid #dde6ef;border-radius:12px;padding:18px;cursor:pointer;background:#fff;transition:all 0.15s}
  .lc:hover{background:#f5f8fb}
  .lc.act-s{border:2px solid #1D9E75;background:#E1F5EE}
  .lc.act-p{border:2px solid #185FA5;background:#E6F1FB}
  .lc-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px}
  .bs{background:#E1F5EE;color:#0F6E56}.bp{background:#E6F1FB;color:#185FA5}
  .lc-title{font-size:14px;font-weight:700;color:#0a1f44;margin-bottom:5px}
  .lc-desc{font-size:12px;color:#666;line-height:1.6}
  .btn-start{width:100%;padding:12px;border:1.5px solid #dde6ef;border-radius:10px;background:transparent;color:#0a1f44;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-top:4px}
  .btn-start:disabled{opacity:0.3;cursor:default}
  .rdy-s{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .rdy-p{background:#185FA5;color:#fff;border-color:#185FA5}
  .ttag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:6px}
  .ts{background:#E1F5EE;color:#0F6E56}.tp{background:#E6F1FB;color:#185FA5}
  .diff-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-left:6px;font-weight:600}
  .easy{background:#EAF3DE;color:#3B6D11}.medium{background:#FAEEDA;color:#854F0B}.hard{background:#FCEBEB;color:#A32D2D}
  .qlabel{font-size:11px;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:6px}
  .scene{background:#f5f8fb;border-radius:0 8px 8px 0;padding:16px 18px;font-size:15px;color:#555;line-height:1.75;margin-bottom:14px}
  .ss{border-left:4px solid #1D9E75}.sp{border-left:4px solid #185FA5}
  .qtext{font-size:18px;font-weight:700;color:#0a1f44;line-height:1.5;margin-bottom:14px}
  .opts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;border:1.5px solid #dde6ef;border-radius:10px;cursor:pointer;background:#fff;transition:all 0.12s}
  .opt:hover{background:#f5f8fb;border-color:#b5d4f4}
  .opt.picked{border:2px solid #185FA5;background:#E6F1FB}
  .opt.picked-s{border:2px solid #1D9E75;background:#E1F5EE}
  .opt.picked .ol{background:#185FA5;color:#fff;border-color:#185FA5}
  .opt.picked-s .ol{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .opt.correct{border:2px solid #1D9E75;background:#E1F5EE}
  .opt.correct .ol{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .opt.wrong{border:2px solid #A32D2D;background:#FCEBEB}
  .opt.wrong .ol{background:#A32D2D;color:#fff;border-color:#A32D2D}
  .ol{min-width:28px;height:28px;border-radius:50%;border:1.5px solid #b5d4f4;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#185FA5;flex-shrink:0;margin-top:1px}
  .ot{font-size:15.5px;color:#1a1a2e;line-height:1.6}
  .submit-btn{width:100%;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;margin-bottom:14px;transition:background 0.12s}
  .sub-s{background:#1D9E75;color:#fff}.sub-s:hover{background:#0F6E56}
  .sub-p{background:#185FA5;color:#fff}.sub-p:hover{background:#0C447C}
  .sub-disabled{background:#dde6ef;color:#999;cursor:default}
  .reveal{border-radius:10px;padding:15px 17px;margin-bottom:14px}
  .rp{background:#eaf3de;border:1.5px solid #3B6D11}
  .rw{background:#faeeda;border:1.5px solid #854F0B}
  .rb{background:#fcebeb;border:1.5px solid #A32D2D}
  .rtitle{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
  .rp .rtitle{color:#3B6D11}.rw .rtitle{color:#854F0B}.rb .rtitle{color:#A32D2D}
  .rbody{font-size:13px;line-height:1.75}
  .rp .rbody{color:#27500A}.rw .rbody{color:#633806}.rb .rbody{color:#791F1F}
  .rtip{font-size:12px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.1);font-style:italic}
  .rp .rtip{color:#3B6D11}.rw .rtip{color:#854F0B}.rb .rtip{color:#791F1F}
  .nav{display:flex;gap:10px}
  .btn{padding:10px 20px;border:1.5px solid #dde6ef;border-radius:8px;background:transparent;color:#0a1f44;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.12s}
  .btn:hover{background:#f5f8fb}
  .btn:disabled{opacity:0.3;cursor:default}
  .nxt-s{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .nxt-p{background:#185FA5;color:#fff;border-color:#185FA5}
  .pill{display:inline-block;font-size:12px;padding:4px 12px;border-radius:99px;font-weight:700;margin:3px}
  .pp{background:#eaf3de;color:#27500A}.pw{background:#faeeda;color:#633806}.pbd{background:#fcebeb;color:#791F1F}
  .ref-box{border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.7;margin:16px 0}
  .refs{background:#E1F5EE;border:1.5px solid #1D9E75;color:#085041}
  .refs strong{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#0F6E56;margin-bottom:5px}
  .refp{background:#E6F1FB;border:1.5px solid #185FA5;color:#0C447C}
  .refp strong{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#185FA5;margin-bottom:5px}
  @media(max-width:600px){.level-cards{grid-template-columns:1fr}.card{padding:24px 18px}}
  @media(max-width:768px){.card{max-width:90%;padding:28px 24px}.header h1{font-size:18px}.qtext{font-size:14px}.scene{font-size:12px;padding:12px 14px}}
  @media(max-width:480px){.card{max-width:95%;padding:20px 16px}.header h1{font-size:16px}.header p{font-size:12px}.qtext{font-size:13px}.scene{font-size:11px;padding:10px 12px}.opt{padding:10px 12px}.ol{min-width:24px;height:24px;font-size:11px}.ot{font-size:12px}}
</style>
</head>
<body>
<div class="card">
  <div id="qa"></div>
</div>
<script src="app.js"></script>
</body>
</html>
